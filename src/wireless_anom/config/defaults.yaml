seed: 42
paths:
  input: "v4_data/25_results/*.csv"
  figures: "outputs/figures"
  tables: "outputs/tables"
  artifacts: "outputs/artifacts"
data:
  mode: "reduced"
  label_column: "label"
  reduced_columns: ["PC1", "PC2"]
features:
  selection: "elasticnet"
  elasticnet:
    alpha: 0.001
    l1_ratio: 0.5
reduce:
  method: "kpca"
  pca:
    n_components: 2
  kpca:
    kernel: "rbf"
    n_components: 2
    gamma_sampling:
      strategy: "logspace"
      start_exp: -3
      end_exp: 1
      num_samples: 5
      select: "max_tev"
detect:
  global: "isoforest"
  isoforest:
    contamination: 0.05
    n_estimators: 100
  local_validation:
    enabled: false
    method: "dbscan"
    dbscan:
      eps: 0.2
      min_samples: 10
classify:
  enabled: true
  models: ["knn", "svm", "rf"]
eval:
  compute_tev: true
  save_confusion: true
viz:
  enabled: true
  scatter: true
  distributions: true
